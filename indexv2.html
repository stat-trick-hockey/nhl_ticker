<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compact NHL Dot-Matrix Ticker</title>
<style>
body {
    margin: 0;
    background: #000;
    font-family: monospace;
}

/* Broadcast banner */
.broadcast-header {
    background: linear-gradient(90deg, #003300, #001100);
    color: #00FF00;
    text-align: center;
    padding: 10px 0;
    font-size: 20px;
    letter-spacing: 1.5px;
    font-weight: bold;
}

/* Ticker wrapper */
.ticker-wrapper {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 50px;
    overflow: hidden;
    display: flex;
    align-items: center;
    border-top: 3px solid #00FF00;
    background: #000;
}

/* Dot matrix container */
.ticker {
    display: flex;
    padding-left: 100%;
    animation: scroll 60s linear infinite;
}

/* Each character is a grid of dots */
.char {
    display: grid;
    grid-template-columns: repeat(5, 4px);
    grid-template-rows: repeat(7, 4px);
    gap: 1px;
    margin-right: 4px;
}

/* Each dot */
.dot {
    width: 4px;
    height: 4px;
    background: #003300;
    border-radius: 50%;
}

/* On dot */
.dot.on {
    background: #00FF00;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>
<body>

<div class="broadcast-header">🏒 NHL NETWORK LIVE NEWS</div>

<div class="ticker-wrapper">
    <div class="ticker" id="tickerContent">
        Loading NHL headlines...
    </div>
</div>

<script>

    "P":[0b11110,0b10001,0b11110,0b10000,0b10000,0b10000,0b00000],
    "Q":[0b01110,0b10001,0b10001,0b10101,0b10010,0b01101,0b00000],
    "R":[0b11110,0b10001,0b11110,0b10010,0b10001,0b10001,0b00000],
    "S":[0b01111,0b10000,0b01110,0b00001,0b00001,0b11110,0b00000],

    "5":[0b11111,0b10000,0b11110,0b00001,0b10001,0b01110,0b00000],

    "7":[0b11111,0b00001,0b00010,0b00100,0b01000,0b01000,0b00000],
    "8":[0b01110,0b10001,0b01110,0b10001,0b10001,0b01110,0b00000],
    "9":[0b01110,0b10001,0b10001,0b01111,0b00001,0b01110,0b00000],
    " ": [0b00000,0b00000,0b00000,0b00000,0b00000,0b00000,0b00000],
    "●":[0b00000,0b00100,0b01110,0b01110,0b00100,0b00000,0b00000],

    "?":[0b01110,0b10001,0b00010,0b00100,0b00000,0b00100,0b00000],
    "'":[0b00100,0b00100,0b00000,0b00000,0b00000,0b00000,0b00000],
    "/":[0b00001,0b00010,0b00100,0b01000,0b10000,0b00000,0b00000],
    "&":[0b01100,0b10010,0b01100,0b10101,0b10010,0b01101,0b00000],
    "(": [0b00010,0b00100,0b01000,0b01000,0b00100,0b00010,0b00000],
    ")": [0b01000,0b00100,0b00010,0b00010,0b00100,0b01000,0b00000]
};

// Convert text to dot-matrix HTML
function textToDots(text, link) {
    const container = document.createDocumentFragment();
    text = text.toUpperCase();
    const headlineSpan = document.createElement("span");
    headlineSpan.style.display = "flex";
    headlineSpan.style.cursor = "pointer";
    headlineSpan.onclick = () => { window.open(link, "_blank"); };

    for (let char of text) {
        const charGrid = document.createElement("div");
        charGrid.className = "char";
        const bitmap = font5x7[char] || font5x7[" "];
        for (let row of bitmap) {
            for (let col=4; col>=0; col--) {
                const dot = document.createElement("div");
                dot.className = "dot";
                if ((row >> col) & 1) dot.classList.add("on");
                charGrid.appendChild(dot);
            }
        }
        headlineSpan.appendChild(charGrid);
    }
    container.appendChild(headlineSpan);
    return container;
}

// Fetch ticker from GitHub Action generated data.json
async function fetchTicker() {
    try {
        const response = await fetch('data.json?cache=' + Date.now());
        const data = await response.json();

        const tickerDiv = document.getElementById("tickerContent");
        tickerDiv.innerHTML = "";

        // Headlines
        data.headlines.forEach(item => {
            tickerDiv.appendChild(textToDots("● " + item.title + " ●", item.link));
        });

        // Games
        data.games.forEach(game => {
            let text = `● ${game.away} ${game.awayScore} @ ${game.home} ${game.homeScore} ${game.status} ${game.time} ●`;
            tickerDiv.appendChild(textToDots(text, "#"));
        });

    } catch (e) {
        console.error(e);
        const tickerDiv = document.getElementById("tickerContent");
        tickerDiv.innerHTML = "";
        tickerDiv.appendChild(textToDots("ERROR FETCHING FEED ●", "#"));
    }
}

// Initial load
fetchTicker();

// Refresh every minute to show live updates
setInterval(fetchTicker, 60000);
</script>

</body>
</html>
