<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NHL News Ticker</title>

<meta http-equiv="refresh" content="900">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body { margin: 0; background: #000; font-family: 'Orbitron', sans-serif; }
.broadcast-header { background: linear-gradient(90deg, #c8102e, #8b0000); color: white; text-align: center; padding: 15px 0; font-size: 28px; letter-spacing: 3px; font-weight: 800; }
.ticker-wrapper { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 4px solid #c8102e; overflow: hidden; height: 70px; display: flex; align-items: center; box-shadow: 0 -5px 20px rgba(200,16,46,0.6); }
.ticker-label { background: #c8102e; color: white; font-weight: 800; padding: 0 25px; font-size: 18px; letter-spacing: 2px; }
.ticker { white-space: nowrap; display: inline-block; padding-left: 100%; animation: scroll 40s linear infinite; font-size: 20px; color: white; }
.ticker:hover { animation-play-state: paused; }
.ticker a { color: #00BFFF; text-decoration: none; margin-right: 60px; }
.ticker a:hover { color: #fff; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>

<body>

<div class="broadcast-header">🏒 NHL NETWORK LIVE NEWS</div>

<div class="ticker-wrapper">
    <div class="ticker-label">BREAKING</div>
    <div class="ticker" id="tickerContent">Loading latest headlines...</div>
</div>

<script>
async function fetchNews() {
    try {
        const feedUrl = encodeURIComponent("https://nhltradetalk.com/feed");
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${feedUrl}`;

        const response = await fetch(apiUrl);
        const data = await response.json();

        let tickerText = "";
        data.items.forEach(item => {
            tickerText += `<a href="${item.link}" target="_blank">● ${item.title}</a>`;
        });

        if(tickerText === "") tickerText = "No recent headlines.";

        document.getElementById("tickerContent").innerHTML = tickerText;

    } catch (e) {
        document.getElementById("tickerContent").innerHTML = "Error fetching feed.";
        console.error(e);
    }
}

fetchNews();
</script>

</body>
</html>
