<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NHL True Dot-Matrix Ticker</title>
<style>
body {
    margin: 0;
    background: #000;
    font-family: monospace;
}

/* Broadcast banner */
.broadcast-header {
    background: linear-gradient(90deg, #003300, #001100);
    color: #00FF00;
    text-align: center;
    padding: 15px 0;
    font-size: 28px;
    letter-spacing: 2px;
    font-weight: bold;
}

/* Ticker wrapper */
.ticker-wrapper {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    overflow: hidden;
    display: flex;
    align-items: center;
    border-top: 4px solid #00FF00;
    background: #000;
}

/* Dot matrix container */
.ticker {
    display: flex;
    padding-left: 100%;
    animation: scroll 40s linear infinite;
}

/* Each character is a grid of dots */
.char {
    display: grid;
    grid-template-columns: repeat(5, 6px); /* 5 columns per character */
    grid-template-rows: repeat(7, 6px);    /* 7 rows per character */
    gap: 2px;
    margin-right: 8px;
}

/* Each dot */
.dot {
    width: 6px;
    height: 6px;
    background: #003300; /* off state */
    border-radius: 50%;
}

/* On dot */
.dot.on {
    background: #00FF00;
}
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>
<body>

<div class="broadcast-header">🏒 NHL NETWORK LIVE NEWS</div>
<div class="ticker-wrapper">
    <div class="ticker" id="tickerContent"></div>
</div>

<script>
// 5x7 font map for A-Z, 0-9 (partial example)
const font5x7 = {
    "A":[0b01110,0b10001,0b11111,0b10001,0b10001,0b10001,0b00000],
    "B":[0b11110,0b10001,0b11110,0b10001,0b10001,0b11110,0b00000],
    "C":[0b01110,0b10001,0b10000,0b10000,0b10001,0b01110,0b00000],
    " ": [0b00000,0b00000,0b00000,0b00000,0b00000,0b00000,0b00000],
    "●":[0b00000,0b00100,0b01110,0b01110,0b00100,0b00000,0b00000]
    // Add more letters as needed
};

// Convert text to dot-matrix HTML
function textToDots(text) {
    const container = document.createDocumentFragment();
    text = text.toUpperCase();
    for (let char of text) {
        const charGrid = document.createElement("div");
        charGrid.className = "char";
        const bitmap = font5x7[char] || font5x7[" "];
        for (let row of bitmap) {
            for (let col=4; col>=0; col--) {
                const dot = document.createElement("div");
                dot.className = "dot";
                if ((row >> col) & 1) dot.classList.add("on");
                charGrid.appendChild(dot);
            }
        }
        container.appendChild(charGrid);
    }
    return container;
}

// Example ticker text
const tickerText = "● NHL TRADE ALERT ● NEW SIGNINGS ● LIVE NEWS ●";

// Render
const tickerDiv = document.getElementById("tickerContent");
tickerDiv.appendChild(textToDots(tickerText));
</script>
</body>
</html>
