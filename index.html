<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NHL Trade Ticker</title>

<meta http-equiv="refresh" content="900">

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, Helvetica, sans-serif;
}

.ticker-wrapper {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #c8102e; /* ESPN red */
    overflow: hidden;
    height: 60px;
    display: flex;
    align-items: center;
}

.ticker-label {
    background: black;
    color: white;
    font-weight: bold;
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    z-index: 2;
}

.ticker {
    white-space: nowrap;
    display: inline-block;
    padding-left: 100%;
    animation: scroll 30s linear infinite;
    color: white;
    font-size: 18px;
}

.ticker a {
    color: white;
    text-decoration: none;
    margin-right: 50px;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="ticker-wrapper">
    <div class="ticker-label">🏒 NHL TRADES</div>
    <div class="ticker" id="tickerContent">
        Loading latest trades...
    </div>
</div>

<script>
async function fetchTrades() {
    const rssUrl = "https://api.allorigins.win/raw?url=" +
        encodeURIComponent("https://www.nhl.com/rss/news");

    const response = await fetch(rssUrl);
    const text = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");

    let tickerText = "";

    items.forEach(item => {
        const title = item.querySelector("title").textContent;
        const link = item.querySelector("link").textContent;

        if (title.toLowerCase().includes("trade")) {
            tickerText += `<a href="${link}" target="_blank">🚨 ${title}</a>`;
        }
    });

    if (tickerText === "") {
        tickerText = "No new trades at the moment.";
    }

    document.getElementById("tickerContent").innerHTML = tickerText;
}

fetchTrades();
</script>

</body>
</html>
