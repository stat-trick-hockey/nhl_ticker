<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NHL News Ticker</title>

<meta http-equiv="refresh" content="900">

<!-- Sports‑broadcast font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    font-family: 'Orbitron', sans-serif;
}

/* Top network banner */
.broadcast-header {
    background: linear-gradient(90deg, #c8102e, #8b0000);
    color: white;
    text-align: center;
    padding: 15px 0;
    font-size: 28px;
    letter-spacing: 3px;
    font-weight: 800;
}

/* Ticker bar */
.ticker-wrapper {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    border-top: 4px solid #c8102e;
    overflow: hidden;
    height: 70px;
    display: flex;
    align-items: center;
}

.ticker-label {
    background: #c8102e;
    color: white;
    font-weight: 800;
    padding: 0 25px;
    font-size: 18px;
    letter-spacing: 2px;
}

.ticker {
    white-space: nowrap;
    display: inline-block;
    padding-left: 100%;
    animation: scroll 40s linear infinite;
    font-size: 20px;
    color: white;
}

.ticker:hover {
    animation-play-state: paused;
}

.ticker a {
    color: #00BFFF;
    text-decoration: none;
    margin-right: 60px;
}

.ticker a:hover {
    color: #fff;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

.ticker-wrapper {
    box-shadow: 0 -5px 20px rgba(200,16,46,0.6);
}
</style>
</head>

<body>

<div class="broadcast-header">
    🏒 NHL NETWORK LIVE NEWS
</div>

<div class="ticker-wrapper">
    <div class="ticker-label">BREAKING</div>
    <div class="ticker" id="tickerContent">
        Loading latest NHL Trade Talk headlines...
    </div>
</div>

<script>
async function fetchNews() {
    try {
        // Fetch NHL Trade Talk RSS feed
        const rssUrl = "https://api.allorigins.win/raw?url=" +
            encodeURIComponent("https://nhltradetalk.com/feed");

        const response = await fetch(rssUrl);
        const text = await response.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");

        const items = xml.querySelectorAll("item");
        let tickerText = "";

        items.forEach(item => {
            const title = item.querySelector("title").textContent;
            const link = item.querySelector("link").textContent;
            tickerText += `<a href="${link}" target="_blank">● ${title}</a>`;
        });

        if (tickerText === "") {
            tickerText = "No recent headlines found.";
        }

        document.getElementById("tickerContent").innerHTML = tickerText;

    } catch (e) {
        document.getElementById("tickerContent").innerHTML = "Error fetching feed.";
        console.error(e);
    }
}

fetchNews();
</script>

</body>
</html>
