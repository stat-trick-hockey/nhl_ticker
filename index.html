<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NHL Dot-Matrix Ticker</title>

<meta http-equiv="refresh" content="900">

<!-- Dot-matrix font -->
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    font-family: 'DotGothic16', monospace;
}

/* Top broadcast banner */
.broadcast-header {
    background: linear-gradient(90deg, #003300, #001100);
    color: #00FF00;
    text-align: center;
    padding: 15px 0;
    font-size: 28px;
    letter-spacing: 2px;
    font-weight: 700;
}

/* Ticker bar */
.ticker-wrapper {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 70px;
    overflow: hidden;
    display: flex;
    align-items: center;
    border-top: 4px solid #00FF00;
    
    /* Dot-matrix background aligned to font */
    background-color: #000;
    background-image: radial-gradient(circle, #003300 1px, transparent 1px);
    background-size: 16px 32px; /* width x height to match DotGothic16 */
}

/* Ticker text */
.ticker {
    white-space: nowrap;
    display: inline-block;
    padding-left: 100%;
    font-size: 24px;
    line-height: 32px; /* matches background dot height */
    color: #00FF00;
    animation: scroll 40s linear infinite;
}

.ticker a {
    color: #00FF00;
    text-decoration: none;
    margin-right: 60px;
}

.ticker a:hover {
    color: #0F0;
}

/* Scroll animation */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="broadcast-header">🏒 NHL NETWORK LIVE NEWS</div>

<div class="ticker-wrapper">
    <div class="ticker" id="tickerContent">
        Loading latest NHL headlines...
    </div>
</div>

<script>
async function fetchNews() {
    try {
        const feedUrl = encodeURIComponent("https://nhltradetalk.com/feed");
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${feedUrl}`;

        const response = await fetch(apiUrl);
        const data = await response.json();

        let tickerText = "";
        data.items.forEach(item => {
            tickerText += `<a href="${item.link}" target="_blank">● ${item.title}</a>`;
        });

        if(tickerText === "") tickerText = "No recent headlines.";

        document.getElementById("tickerContent").innerHTML = tickerText;

    } catch (e) {
        document.getElementById("tickerContent").innerHTML = "Error fetching feed.";
        console.error(e);
    }
}

fetchNews();
</script>

</body>
</html>
